name: Backend CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/integration_test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run NPM Audit (Security Checks)
      run: npm audit --audit-level=high || true

    - name: Run ESLint
      run: npm run lint

    - name: Run Unit Tests
      run: npm test
      
    - name: Run Integration Tests
      env:
        MONGO_URI: mongodb://127.0.1.1:27017/integration_test
      run: npm run test:integration

    - name: Validate Docker Build
      run: docker build -t se-backend-test .
